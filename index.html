<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkplaats Administratie</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Administratie">
<meta name="theme-color" content="#F0EBDD">
<style>
  :root{
    --bg:#F7F5F0;
    --panel:#FFFFFF;
    --sidebar-bg:#F0EBDD;
    --copper:#B06B34;
    --copper-dark:#8A5127;
    --copper-bg:#F3E3CE;
    --oak:#C9A876;
    --tag-bg:#EEE1C6;
    --tag-text:#7A4E1E;
    --sage:#5E7350;
    --sage-bg:#E3E9DA;
    --rust:#9C4530;
    --rust-bg:#F2E0D8;
    --amber:#B4832E;
    --amber-bg:#F4E9D2;
    --text:#2A2118;
    --text-muted:#7A6C58;
    --border:#E3DAC5;
    --font-display:Arial, Helvetica, sans-serif;
    --font-body:Arial, Helvetica, sans-serif;
    --font-mono:Arial, Helvetica, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:220px; flex-shrink:0;
    background:var(--sidebar-bg);
    color:var(--text);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:20px 0;
  }
  .sidebar .brand{
    font-family:var(--font-display); font-size:19px; font-weight:700;
    padding:0 20px 18px 20px; border-bottom:1px solid var(--border);
    margin-bottom:10px; letter-spacing:0.2px; color:var(--text);
  }
  .sidebar .brand span{display:block; font-family:var(--font-mono); font-size:10.5px; font-weight:400; color:var(--copper-dark); text-transform:uppercase; letter-spacing:1.5px; margin-top:3px;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:11px 20px; cursor:pointer; font-size:14.5px; color:var(--text-muted);
    border-left:3px solid transparent;
    transition:background .12s, color .12s;
  }
  .nav-item:hover{background:rgba(0,0,0,0.04); color:var(--text);}
  .nav-item.active{background:var(--copper-bg); color:var(--copper-dark); border-left:3px solid var(--copper);}
  .nav-item .dot{width:6px; height:6px; border-radius:50%; background:currentColor; opacity:0.55; flex-shrink:0;}

  /* Main */
  #main-content{flex:1; padding:32px 40px; max-width:1180px;}
  h1.page-title{font-family:var(--font-display); font-weight:700; font-size:26px; margin:0 0 4px 0;}
  p.page-sub{color:var(--text-muted); margin:0 0 26px 0; font-size:14px;}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:12px; flex-wrap:wrap;}
  .search-input{
    border:1px solid var(--border); background:var(--panel); border-radius:6px;
    padding:9px 12px; font-size:14px; font-family:var(--font-body); width:260px; color:var(--text);
  }
  .search-input:focus{outline:none; border-color:var(--copper);}

  button{font-family:var(--font-body); cursor:pointer;}
  .btn{
    border:1px solid var(--border); background:var(--panel); color:var(--text);
    padding:9px 16px; border-radius:6px; font-size:13.5px; font-weight:500;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{border-color:var(--copper); color:var(--copper-dark);}
  .btn-primary{background:var(--copper-bg); border-color:var(--copper); color:var(--copper-dark); font-weight:700;}
  .btn-primary:hover{background:var(--copper); border-color:var(--copper); color:#fff;}
  .btn-ghost{border-color:transparent; background:transparent; padding:6px 10px;}
  .btn-ghost:hover{background:rgba(0,0,0,0.04);}
  .btn-danger{color:var(--rust);}
  .btn-danger:hover{border-color:var(--rust); color:var(--rust);}
  .btn-sm{padding:5px 10px; font-size:12.5px;}

  /* Tag / nummer signature element (workshop label) */
  .tag-nummer{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:11.5px; font-weight:700;
    background:var(--tag-bg); color:var(--tag-text);
    padding:3px 10px 3px 7px;
    border-radius:2px 8px 8px 2px;
  }
  .tag-nummer::before{
    content:''; width:5px; height:5px; border-radius:50%;
    background:var(--bg); border:1px solid var(--copper); flex-shrink:0;
  }
  .tag-nummer.copper{background:var(--copper-bg); color:var(--copper-dark);}
  .tag-nummer.sage{background:var(--sage-bg); color:var(--sage);}

  /* Cards */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:28px;}
  .stat-card{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px 18px;}
  .stat-card .label{font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;}
  .stat-card .value{font-family:var(--font-display); font-size:26px; font-weight:600;}
  .stat-card .sub{font-size:12px; color:var(--text-muted); margin-top:4px;}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden;}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.4px;
    color:var(--text-muted); font-weight:600; padding:11px 16px; border-bottom:1px solid var(--border);
    background:#FAF7EF;
  }
  tbody td{padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:#FAF7EF;}
  .row-actions{display:flex; gap:4px; opacity:0; transition:opacity .1s;}
  tbody tr:hover .row-actions{opacity:1;}

  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:500;}
  .badge-sage{background:var(--sage-bg); color:var(--sage);}
  .badge-rust{background:var(--rust-bg); color:var(--rust);}
  .badge-amber{background:var(--amber-bg); color:var(--amber);}
  .badge-gray{background:#EDEAE1; color:var(--text-muted);}

  .empty-state{padding:60px 20px; text-align:center; color:var(--text-muted);}
  .empty-state .icon{font-size:30px; margin-bottom:10px; opacity:0.5;}
  .empty-state .title{font-family:var(--font-display); font-size:17px; color:var(--text); margin-bottom:4px;}

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,33,22,0.45); display:flex;
    align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; z-index:100;
  }
  .modal{background:var(--panel); border-radius:12px; width:100%; max-width:560px; padding:26px 28px 24px; box-shadow:0 12px 40px rgba(0,0,0,0.2);}
  .modal h2{font-family:var(--font-display); font-size:19px; font-weight:600; margin:0 0 18px 0;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:500; color:var(--text-muted); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; border:1px solid var(--border); border-radius:6px; padding:9px 11px;
    font-family:var(--font-body); font-size:14px; color:var(--text); background:#fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--copper);}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:22px;}

  /* Regel-tabel (begroting/offerte/factuur) */
  .regels-table input, .regels-table select{padding:6px 8px; font-size:13px; border:1px solid var(--border); border-radius:5px; width:100%;}
  .regels-table td{padding:6px 6px;}
  .regels-table thead th{padding:8px 6px; font-size:10.5px;}
  .totals-box{margin-top:16px; padding:14px 18px; background:#FAF7EF; border-radius:8px; max-width:320px; margin-left:auto;}
  .totals-row{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0;}
  .totals-row.grand{font-weight:600; font-size:16px; padding-top:8px; border-top:1px solid var(--border); margin-top:4px; font-family:var(--font-display);}

  .breadcrumb{font-size:13px; color:var(--text-muted); margin-bottom:10px;}
  .breadcrumb a{color:var(--copper-dark); text-decoration:none; cursor:pointer;}
  .breadcrumb a:hover{text-decoration:underline;}

  .info-line{font-size:13.5px; color:var(--text-muted); margin-bottom:2px;}
  .info-line b{color:var(--text); font-weight:500;}

  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--panel); color:var(--text);
    border:1px solid var(--border);
    padding:12px 20px; border-radius:8px; font-size:13.5px; box-shadow:0 6px 20px rgba(0,0,0,0.12);
    z-index:200; opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1; transform:translateY(0);}

  /* Vergrendel- en loginscherm */
  #lock-screen, #login-screen{
    position:fixed; inset:0; background:var(--bg); z-index:500;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    padding:20px; overflow-y:auto;
  }
  #lock-screen .lock-box, #login-screen .lock-box{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:34px 32px; width:100%; max-width:340px; text-align:center;
  }
  #lock-screen .lock-icon, #login-screen .lock-icon{font-size:26px; margin-bottom:10px;}
  #lock-screen h2, #login-screen h2{font-family:var(--font-display); font-size:19px; font-weight:700; margin:0 0 18px;}
  #lock-screen input, #login-screen input{
    width:100%; border:1px solid var(--border); border-radius:6px; padding:12px; font-size:18px;
    text-align:center; letter-spacing:4px; margin-bottom:12px; font-family:var(--font-body);
  }
  #lock-screen .lock-error, #login-screen .lock-error{color:var(--rust); font-size:13px; min-height:18px; margin-bottom:8px;}
  #login-screen .field{margin-bottom:12px;}
  #login-screen .field label{display:block; font-size:12px; font-weight:500; color:var(--text-muted); margin-bottom:4px; text-align:left;}
  #login-screen .field input{text-align:left; letter-spacing:normal; font-size:14px; padding:9px 11px; margin-bottom:0;}

  @media (max-width:760px){
    #app{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; overflow-x:auto; padding:10px;}
    .sidebar .brand{display:none;}
    .nav-item{border-left:none; border-bottom:3px solid transparent; white-space:nowrap;}
    .nav-item.active{border-left:none; border-bottom:3px solid var(--copper);}
    #main-content{padding:20px;}
    .field-row{grid-template-columns:1fr;}
  }
</style>

  };

const STORAGE_KEY = 'werkplaats-administratie-data';

async function loadState(){
  state = defaultState();
  return new Promise((resolve)=>{
    let ontvangen = {klanten:false, projecten:false, offertes:false, facturen:false, instellingen:false, counters:false, werknemers:false, urenregistraties:false, materialen:false};
    function checkKlaar(){
      if(Object.values(ontvangen).every(Boolean)) resolve();
    }
    onSnapshotUnsubs.push(db.collection('urenregistraties').onSnapshot(snap=>{
      state.urenregistraties = snap.docs.map(d=>({id:d.id, ...d.data()}));
      ontvangen.urenregistraties = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('urenregistraties', err)));
    onSnapshotUnsubs.push(db.collection('werknemers').onSnapshot(snap=>{
      state.werknemers = snap.docs.map(d=>({uid:d.id, ...d.data()}));
      ontvangen.werknemers = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('werknemers', err)));
    onSnapshotUnsubs.push(db.collection('materialen').onSnapshot(snap=>{
      state.materialen = snap.docs.map(d=>({id:d.id, ...d.data()}));
      ontvangen.materialen = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('materialen', err)));
    onSnapshotUnsubs.push(db.collection('klanten').onSnapshot(snap=>{
      state.klanten = snap.docs.map(d=>d.data());
      normaliseerState(); ontvangen.klanten = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('klanten', err)));
    onSnapshotUnsubs.push(db.collection('projecten').onSnapshot(snap=>{
      state.projecten = snap.docs.map(d=>d.data());
      normaliseerState(); ontvangen.projecten = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('projecten', err)));
    onSnapshotUnsubs.push(db.collection('offertes').onSnapshot(snap=>{
      state.offertes = snap.docs.map(d=>d.data());
      normaliseerState(); ontvangen.offertes = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('offertes', err)));
    onSnapshotUnsubs.push(db.collection('facturen').onSnapshot(snap=>{
      state.facturen = snap.docs.map(d=>d.data());
      normaliseerState(); ontvangen.facturen = true; checkKlaar();
      if(document.getElementById('app')) render();
    }, err=> console.error('facturen', err)));
    onSnapshotUnsubs.push(db.collection('meta').doc('instellingen').onSnapshot(snap=>{
      if(snap.exists) state.instellingen = snap.data();
      normaliseerState(); ontvangen.instellingen = true; checkKlaar();
      if(document.getElementById('app')){ render(); stelFaviconIn(); }
    }, err=> console.error('instellingen', err)));
    onSnapshotUnsubs.push(db.collection('meta').doc('counters').onSnapshot(snap=>{
      if(snap.exists) state.counters = snap.data();
      ontvangen.counters = true; checkKlaar();
    }, err=> console.error('counters', err)));
  });
}

function normaliseerState(){
  if(!state.projecten) state.projecten = [];
  if(!state.offertes) state.offertes = [];
  if(!state.facturen) state.facturen = [];
  if(!state.klanten) state.klanten = [];
  if(!state.werknemers) state.werknemers = [];
  if(!state.urenregistraties) state.urenregistraties = [];
  if(!state.materialen) state.materialen = [];
  if(!state.counters) state.counters = {klant:0, project:0, offerte:0, factuur:0};
  if(!state.instellingen) state.instellingen = { uurtarief:65, materiaalmarge:30, btw:21, kantoorkosten:5,
    bedrijfsnaam:'', adres:'', postcode:'', plaats:'', telefoon:'', email:'', website:'', kvk:'', btwnummer:'', iban:'', ondertekenaar:'', betalingscondities:'60% bij opdracht\n40% bij levering', logoBase64: DEFAULT_LOGO_BASE64, logoMime:'image/jpeg' };
  if(state.instellingen.bedrijfsnaam===undefined){
    Object.assign(state.instellingen, {bedrijfsnaam:'', adres:'', postcode:'', plaats:'', telefoon:'', email:'', website:'', kvk:'', btwnummer:'', iban:''});
  }
  if(state.instellingen.ondertekenaar===undefined) state.instellingen.ondertekenaar = '';
  if(state.instellingen.website===undefined) state.instellingen.website = '';
  if(!state.instellingen.bedrijfsnaam){
    Object.assign(state.instellingen, {
      bedrijfsnaam:'Van Aken & Backer Meubelmakerij',
      adres:'Bellstraat 2e', postcode:'3133 KE', plaats:'Vlaardingen',
      telefoon:'(010) 512 11 08', email:'info@ab-meubels.com', website:'www.ab-meubels.com',
      kvk:'83978917', iban:'NL74 RABO 0139.5874.46'
    });
  }
  if(state.instellingen.betalingscondities===undefined) state.instellingen.betalingscondities = '60% bij opdracht\n40% bij levering';
  if(state.instellingen.logoBase64===undefined) state.instellingen.logoBase64 = DEFAULT_LOGO_BASE64;
  if(state.instellingen.logoMime===undefined) state.instellingen.logoMime = 'image/jpeg';
  if(state.instellingen.pincodeHash===undefined) state.instellingen.pincodeHash = '';
  state.klanten.forEach(k=>{ if(k.contactpersoon===undefined) k.contactpersoon = ''; });
  state.offertes.forEach(o=>{ if(o.uwKenmerk===undefined) o.uwKenmerk=''; if(o.behandelaar===undefined) o.behandelaar=''; });
  state.facturen.forEach(f=>{ if(f.uwKenmerk===undefined) f.uwKenmerk=''; if(f.behandelaar===undefined) f.behandelaar=''; if(!f.type) f.type='standaard'; });
  state.projecten.forEach(p=>{
    if(!p.begroting) p.begroting = {onderdelen:[], opmerkingen:''};
    if(p.begroting.regels && !p.begroting.onderdelen){
      // migratie vanuit oude, platte begrotingsstructuur (v1)
      p.begroting = {
        onderdelen: p.begroting.regels.length ? [{id:uid(), naam:'Onderdeel 1',
          materiaalregels: p.begroting.regels.map(r=>({id:uid(), aantal:r.aantal||1, omschrijving:r.omschrijving||'', prijs:r.prijs||0})),
          urenregels: []
        }] : [],
        opmerkingen: p.begroting.opmerkingen || ''
      };
    }
    if(!p.begroting.onderdelen) p.begroting.onderdelen = [];
    p.begroting.onderdelen.forEach(o=>{
      if(o.regels && !o.materiaalregels){
        // migratie vanuit v2 (materiaal + uren gecombineerd per regel)
        o.materiaalregels = o.regels.map(r=>({id:r.id||uid(), aantal:r.aantal||0, omschrijving:r.omschrijving||'', prijs:r.prijs||0}));
        o.urenregels = o.regels.filter(r=> (r.urenVoorbereiding||0)>0 || (r.urenMontage||0)>0)
          .map(r=>({id:uid(), omschrijving:r.omschrijving||'', urenVoorbereiding:r.urenVoorbereiding||0, urenMontage:r.urenMontage||0}));
        delete o.regels;
      }
      if(!o.materiaalregels) o.materiaalregels = [];
      if(o.afmetingen===undefined) o.afmetingen = '';
      if(!o.urenregels) o.urenregels = [];
    });
  });
}

async function saveState(){
  try{
    const writes = [];
    state.klanten.forEach(k=> writes.push(db.collection('klanten').doc(k.id).set(k)));
    state.projecten.forEach(p=> writes.push(db.collection('projecten').doc(p.id).set(p)));
    state.offertes.forEach(o=> writes.push(db.collection('offertes').doc(o.id).set(o)));
    state.facturen.forEach(f=> writes.push(db.collection('facturen').doc(f.id).set(f)));
    writes.push(db.collection('meta').doc('instellingen').set(state.instellingen));
    writes.push(db.collection('meta').doc('counters').set(state.counters));
    await Promise.all(writes);
  }catch(e){
    showToast('Opslaan mislukt: ' + e.message);
  }
}

/* ===================== HELPERS ===================== */
function euro(n){
  return (n||0).toLocaleString('nl-NL', {style:'currency', currency:'EUR'});
}
function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(iso, days){
  const d = new Date(iso); d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function uid(){ return 'r' + Math.random().toString(36).slice(2,9); }
function leesBestandAlsBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function leesBestandAlsTekst(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}
async function hashTekst(tekst){
  try{
    if(window.crypto && window.crypto.subtle){
      const data = new TextEncoder().encode(tekst);
      const buf = await window.crypto.subtle.digest('SHA-256', data);
      return 'sha256:' + Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){ /* val terug op eenvoudige hash */ }
  let h = 0;
  for(let i=0;i<tekst.length;i++){ h = (h*31 + tekst.charCodeAt(i)) >>> 0; }
  return 'fb:' + h.toString(16);
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function klantById(id){ return state.klanten.find(k=>k.id===id); }
function projectById(id){ return state.projecten.find(p=>p.id===id); }
function offerteById(id){ return state.offertes.find(o=>o.id===id); }
function regelTotaal(regel){ return (parseFloat(regel.aantal)||0) * (parseFloat(regel.prijs)||0); }
function subtotaal(regels){ return regels.reduce((s,r)=>s+regelTotaal(r), 0); }
function som(getallen){ return getallen.reduce((s,n)=>s+(n||0), 0); }

/* ---- Begrotingsregels (onderdelen-model met materiaal en uren gescheiden, o.b.v. de aangeleverde Excel-begroting) ---- */
function berekenMateriaalRegel(r){
  const marge = 1 + (state.instellingen.materiaalmarge/100);
  const inkoop = (parseFloat(r.aantal)||0) * (parseFloat(r.prijs)||0);
  const verkoop = inkoop * marge;
  return {inkoop, verkoop};
}
function berekenUrenRegel(r){
  const urenVb = parseFloat(r.urenVoorbereiding)||0;
  const urenMont = parseFloat(r.urenMontage)||0;
  const uurtarief = state.instellingen.uurtarief;
  const euroVb = urenVb * uurtarief;
  const euroMont = urenMont * uurtarief;
  return {urenVb, urenMont, urenTotaal: urenVb+urenMont, euroVb, euroMont, euroUren: euroVb+euroMont};
}
function berekenOnderdeel(onderdeel){
  let inkoop=0, verkoop=0;
  onderdeel.materiaalregels.forEach(r=>{ const b = berekenMateriaalRegel(r); inkoop+=b.inkoop; verkoop+=b.verkoop; });
  let uren=0, euroUren=0;
  onderdeel.urenregels.forEach(r=>{ const b = berekenUrenRegel(r); uren+=b.urenTotaal; euroUren+=b.euroUren; });
  const kantoorkosten = (verkoop + euroUren) * (state.instellingen.kantoorkosten/100);
  const aanneemsomExcl = verkoop + euroUren + kantoorkosten;
  const aanneemsomIncl = aanneemsomExcl * (1 + state.instellingen.btw/100);
  return {inkoop, verkoop, uren, euroUren, kantoorkosten, aanneemsomExcl, aanneemsomIncl};
}
function berekenBegroting(begroting){
  let inkoop=0, verkoop=0, uren=0, kantoorkosten=0, excl=0, incl=0;
  begroting.onderdelen.forEach(o=>{
    const b = berekenOnderdeel(o);
    inkoop+=b.inkoop; verkoop+=b.verkoop; uren+=b.uren; kantoorkosten+=b.kantoorkosten; excl+=b.aanneemsomExcl; incl+=b.aanneemsomIncl;
  });
  return {inkoop, verkoop, uren, kantoorkosten, excl, incl};
}

function bouwOnderdeelOmschrijving(o){
  const regels = [];
  if(o.afmetingen && o.afmetingen.trim()) regels.push(`Afmetingen: ${o.afmetingen.trim()}`);
  const materialen = (o.materiaalregels||[]).map(r=>r.omschrijving).filter(m=>m && m.trim());
  if(materialen.length) regels.push(`Materiaal: ${materialen.join(', ')}`);
  if(!regels.length) return '';
  return `${o.naam}\n${regels.map(r=>`- ${r}`).join('\n')}`;
}

  const link = `mailto:${encodeURIComponent(klant.email)}?subject=${encodeURIComponent(onderwerp)}&body=${encodeURIComponent(tekst)}`;

/* ===================== ROUTER ===================== */
let currentView = 'dashboard';
let currentParams = {};

function navigate(view, params){
  currentView = view;
  currentParams = params || {};
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view === view);
  });
  render();
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=> navigate(el.dataset.view, {}));
});

function render(){
  const main = document.getElementById('main-content');
  if(currentView === 'dashboard') main.innerHTML = viewDashboard();
  else if(currentView === 'klanten') main.innerHTML = viewKlanten();
  else if(currentView === 'klant-detail') main.innerHTML = viewKlantDetail(currentParams.id);
  else if(currentView === 'projecten') main.innerHTML = viewProjecten();
  else if(currentView === 'project-detail') main.innerHTML = viewProjectDetail(currentParams.id);
  else if(currentView === 'offertes') main.innerHTML = viewOffertes();
  else if(currentView === 'offerte-detail') main.innerHTML = viewOfferteDetail(currentParams.id);
  else if(currentView === 'facturen') main.innerHTML = viewFacturen();
  else if(currentView === 'factuur-detail') main.innerHTML = viewFactuurDetail(currentParams.id);
  else if(currentView === 'instellingen') main.innerHTML = viewInstellingen();
  else if(currentView === 'werknemers') main.innerHTML = viewWerknemers();
  else if(currentView === 'uren') main.innerHTML = viewUren();
  else if(currentView === 'materialen') main.innerHTML = viewMaterialen();
  else if(currentView === 'btw') main.innerHTML = viewBtw();
  else if(currentView === 'backup') main.innerHTML = viewBackup();
  attachViewHandlers();
  toonVergrendelknopIndienNodig();
}

      </div>

        <div class="value">${openOffertes}</div>
      </div>

        <div class="sub">${openFacturen.length} openstaande factu${openFacturen.length===1?'ur':'ren'}</div>
      </div>
    </div>

    <div class="panel">
      <table>
        <thead><tr><th>Werknummer</th><th>Klant</th><th>Omschrijving</th><th>Status</th><th>Startdatum</th></tr></thead>

function viewKlantDetail(id){
  const k = klantById(id);
  if(!k) return `<p>Klant niet gevonden. <a class="breadcrumb" data-nav="klanten">Terug naar klanten</a></p>`;
  const projecten = state.projecten.filter(p=>p.klantId===id).sort((a,b)=> b.id.localeCompare(a.id));
  const offertes = state.offertes.filter(o=>{ const p = projectById(o.projectId); return p && p.klantId===id; });
  const facturen = state.facturen.filter(f=>{ const p = projectById(f.projectId); return p && p.klantId===id; });

function openKlantModal(klantId){
  const klant = klantId ? klantById(klantId) : null;
  openModal(klantForm(klant));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('klant-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());
    if(klant){
      Object.assign(klant, data);
    } else {
      data.id = nextKlantNummer();
      state.klanten.push(data);
    }
    await saveState();
    closeModal();
    showToast(klant ? 'Klant bijgewerkt' : `Klant ${data.id} toegevoegd`);
    render();
  });
}

async function deleteKlant(id){
  const heeftProjecten = state.projecten.some(p=>p.klantId===id);
  if(heeftProjecten){ showToast('Kan klant niet verwijderen: er zijn nog projecten aan gekoppeld'); return; }
  if(!confirm('Deze klant verwijderen?')) return;
  state.klanten = state.klanten.filter(k=>k.id!==id);
  try{ await db.collection('klanten').doc(id).delete(); }catch(e){ showToast('Verwijderen mislukt: '+e.message); return; }
  showToast('Klant verwijderd');
  render();
}

function openProjectModal(){

async function deleteProject(id){
  const gekoppeld = state.offertes.some(o=>o.projectId===id) || state.facturen.some(f=>f.projectId===id);
  if(gekoppeld){ showToast('Kan project niet verwijderen: er zijn offertes/facturen aan gekoppeld'); return; }

  state.projecten = state.projecten.filter(p=>p.id!==id);
  try{ await db.collection('projecten').doc(id).delete(); }catch(e){ showToast('Verwijderen mislukt: '+e.message); return; }
  showToast('Project verwijderd');
  render();
}

function leesOnderdeelUitDOM(onderdeelId){
  const materiaalregels = [];
  document.querySelectorAll(`.materiaal-regels-body[data-onderdeel-id="${onderdeelId}"] tr`).forEach(row=>{
    materiaalregels.push({
      id: row.dataset.regelId,
      aantal: parseFloat(row.querySelector('.regel-aantal').value) || 0,
      omschrijving: row.querySelector('.regel-omschrijving').value,
      prijs: parseFloat(row.querySelector('.regel-prijs').value) || 0,
    });
  });
  const urenregels = [];
  document.querySelectorAll(`.uren-regels-body[data-onderdeel-id="${onderdeelId}"] tr`).forEach(row=>{
    urenregels.push({
      id: row.dataset.regelId,
      omschrijving: row.querySelector('.regel-omschrijving').value,
      urenVoorbereiding: parseFloat(row.querySelector('.regel-uren-vb').value) || 0,
      urenMontage: parseFloat(row.querySelector('.regel-uren-mont').value) || 0,

  });
  return {materiaalregels, urenregels};
}

function leesAlleOnderdelenUitDOM(p){
  document.querySelectorAll('[data-onderdeel-id].panel').forEach(block=>{
    const oid = block.dataset.onderdeelId;
    const onderdeel = p.begroting.onderdelen.find(o=>o.id===oid);
    if(!onderdeel) return;
    const gelezen = leesOnderdeelUitDOM(oid);
    onderdeel.materiaalregels = gelezen.materiaalregels;
    onderdeel.urenregels = gelezen.urenregels;
    const naamInput = block.querySelector('.onderdeel-naam');
    if(naamInput) onderdeel.naam = naamInput.value;
    const afmetingenInput = block.querySelector('.onderdeel-afmetingen');
    if(afmetingenInput) onderdeel.afmetingen = afmetingenInput.value;
  });
}

/* ===================== VIEW HANDLERS (event delegation per render) ===================== */
function attachViewHandlers(){
  const main = document.getElementById('main-content');

  // Generieke breadcrumb navigatie
  main.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=> navigate(el.dataset.nav, {}));
  });

  if(currentView === 'klanten'){
    const zoek = document.getElementById('klant-zoek');
    zoek.addEventListener('input', (e)=>{ klantZoek = e.target.value; render(); zoek_focus(); });
    document.getElementById('btn-nieuwe-klant').addEventListener('click', ()=> openKlantModal());
    main.querySelectorAll('[data-open-klant]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('[data-edit-klant],[data-del-klant]')) return;
        navigate('klant-detail', {id: row.dataset.openKlant});
      });
    });
    main.querySelectorAll('[data-edit-klant]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); openKlantModal(btn.dataset.editKlant); });
    });
    main.querySelectorAll('[data-del-klant]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); deleteKlant(btn.dataset.delKlant); });
    });
  }

  if(currentView === 'klant-detail'){
    const bewerkBtn = document.getElementById('btn-klant-bewerken');
    if(bewerkBtn) bewerkBtn.addEventListener('click', ()=> openKlantModal(currentParams.id));
    main.querySelectorAll('[data-open-project]').forEach(row=>{
      row.addEventListener('click', ()=> navigate('project-detail', {id: row.dataset.openProject}));
    });
    main.querySelectorAll('[data-open-offerte]').forEach(row=>{
      row.addEventListener('click', ()=> navigate('offerte-detail', {id: row.dataset.openOfferte}));
    });
    main.querySelectorAll('[data-open-factuur]').forEach(row=>{
      row.addEventListener('click', ()=> navigate('factuur-detail', {id: row.dataset.openFactuur}));
    });
  }

  if(currentView === 'projecten'){
    const zoek = document.getElementById('project-zoek');
    zoek.addEventListener('input', (e)=>{ projectZoek = e.target.value; render(); zoek_focus(); });
    const nieuwBtn = document.getElementById('btn-nieuw-project');
    if(nieuwBtn) nieuwBtn.addEventListener('click', ()=> openProjectModal());
    main.querySelectorAll('[data-open-project]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('[data-del-project]')) return;
        navigate('project-detail', {id: row.dataset.openProject});
      });
    });
    main.querySelectorAll('[data-del-project]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); deleteProject(btn.dataset.delProject); });
    });
  }

  if(currentView === 'project-detail'){
    const p = projectById(currentParams.id);
    if(!p) return;
    const facturatieOfferte = state.offertes.filter(o=>o.projectId===p.id && o.regels.length).sort((a,b)=>(a.datum||'').localeCompare(b.datum||'')).pop();

    document.getElementById('project-status-select').addEventListener('change', async (e)=>{
      p.status = e.target.value; await saveState(); showToast('Status bijgewerkt');
    });

    function herbereken(){
      leesAlleOnderdelenUitDOM(p);
      p.begroting.onderdelen.forEach(o=>{
        const b = berekenOnderdeel(o);
        const block = main.querySelector(`[data-onderdeel-id="${o.id}"]`);
        if(!block) return;

        await verwijderMapHandle();
        showToast('Map losgekoppeld, exports gaan weer naar Downloads');
        render();
      });
    }

    const btnPincodeOpslaan = document.getElementById('btn-pincode-opslaan');
    if(btnPincodeOpslaan) btnPincodeOpslaan.addEventListener('click', async ()=>{
      const nieuw = document.getElementById('inst-pincode-nieuw').value;
      const bevestig = document.getElementById('inst-pincode-bevestig').value;
      if(!nieuw && state.instellingen.pincodeHash){ showToast('Geen wijziging: laat beide velden leeg om de huidige pincode te behouden, of vul een nieuwe pincode in'); return; }
      if(!nieuw){ showToast('Vul een pincode in'); return; }
      if(nieuw.length < 4){ showToast('Gebruik minimaal 4 tekens'); return; }
      if(nieuw !== bevestig){ showToast('De pincodes komen niet overeen'); return; }
      state.instellingen.pincodeHash = await hashTekst(nieuw);
      await saveState();
      showToast('Pincode ingesteld');
      render();
    });
    const btnPincodeVerwijderen = document.getElementById('btn-pincode-verwijderen');
    if(btnPincodeVerwijderen) btnPincodeVerwijderen.addEventListener('click', async ()=>{
      if(!confirm('Pincode-vergrendeling uitzetten?')) return;
      state.instellingen.pincodeHash = '';
      await saveState();
      showToast('Pincode verwijderd');
      render();
    });
  }

  if(currentView === 'werknemers'){
    document.getElementById('btn-nieuwe-werknemer').addEventListener('click', ()=>{
      openModal(werknemerForm());
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('werknemer-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const fd = new FormData(e.target);
        const naam = fd.get('naam').trim();
        const wachtwoord = fd.get('wachtwoord');
        if(state.werknemers.some(w=> w.naam.toLowerCase()===naam.toLowerCase())){
          document.getElementById('werknemer-form-error').textContent = 'Er bestaat al een werknemer met deze naam';
          return;
        }
        try{
          await maakWerknemerAccount(naam, wachtwoord);
          closeModal();
          showToast(`Werknemer ${naam} toegevoegd`);
        }catch(err){
          document.getElementById('werknemer-form-error').textContent = 'Aanmaken mislukt: ' + err.message;
        }
      });
    });
    main.querySelectorAll('[data-toggle-werknemer]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const uid = btn.dataset.toggleWerknemer;
        const nieuweStatus = btn.dataset.actief !== 'true';
        try{
          await db.collection('werknemers').doc(uid).update({actief: nieuweStatus});
          showToast(nieuweStatus? 'Werknemer geactiveerd' : 'Werknemer gedeactiveerd');
        }catch(err){ showToast('Bijwerken mislukt: ' + err.message); }
      });
    });
  }

  if(currentView === 'uren'){
    document.getElementById('uren-werknemer-filter').addEventListener('change', (e)=>{
      urenWerknemerFilter = e.target.value;
      render();
    });
    document.getElementById('uren-afwezig-filter').addEventListener('change', (e)=>{
      urenAlleenAfwezigheid = e.target.checked;
      render();
    });
  }

  if(currentView === 'materialen'){
    const zoek = document.getElementById('materiaal-zoek');
    zoek.addEventListener('input', (e)=>{ materiaalZoek = e.target.value; render(); zoek_focus(); });
    document.getElementById('btn-nieuw-materiaal').addEventListener('click', ()=> openMateriaalModal());
    main.querySelectorAll('[data-edit-materiaal]').forEach(btn=>{
      btn.addEventListener('click', ()=> openMateriaalModal(btn.dataset.editMateriaal));
    });
    main.querySelectorAll('[data-del-materiaal]').forEach(btn=>{
      btn.addEventListener('click', ()=> verwijderMateriaal(btn.dataset.delMateriaal));
    });
  }

  if(currentView === 'backup'){
    document.getElementById('btn-backup-download').addEventListener('click', ()=>{
      exporteerBackup();
      render();
    });
    document.getElementById('btn-backup-herstellen').addEventListener('click', async ()=>{
      const input = document.getElementById('backup-bestand');
      if(!input.files || !input.files[0]){ showToast('Kies eerst een back-upbestand'); return; }
      await herstelBackup(input.files[0]);
    });
  }

  if(currentView === 'dashboard'){
    main.querySelectorAll('[data-open-project]').forEach(row=>{
      row.addEventListener('click', ()=> navigate('project-detail', {id: row.dataset.openProject}));
    });
  }
}

function zoek_focus(){
  const el = document.getElementById('klant-zoek') || document.getElementById('project-zoek') || document.getElementById('materiaal-zoek');
  if(el){ el.focus(); const v = el.value; el.value=''; el.value=v; }
}

/* ===================== EXCEL EXPORT (begrotingsstaat) ===================== */
function colLetter(n){
  let s=''; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s;
}
function sheetNaam(naam, gebruikt){
  let base = String(naam||'Onderdeel').replace(/[\\\/\?\*\[\]:]/g,' ').trim().slice(0,28) || 'Onderdeel';
  let out = base, n=2;
  while(gebruikt.has(out)){ out = base.slice(0,25) + ' ' + n; n++; }
  gebruikt.add(out);
  return out;
}

async function exporteerBegrotingNaarExcel(p){
  if(typeof XLSX === 'undefined'){ showToast('Excel-bibliotheek kon niet laden, controleer je internetverbinding'); return; }
  const k = klantById(p.klantId);
  const i = state.instellingen;
  const wb = XLSX.utils.book_new();

  // Voorblad
  const gekoppeldeOffertesVb = state.offertes.filter(o=>o.projectId===p.id).sort((a,b)=>(a.datum||'').localeCompare(b.datum||''));
  const laatsteOfferteVb = gekoppeldeOffertesVb[gekoppeldeOffertesVb.length-1];
  const behandelaarVb = (laatsteOfferteVb && laatsteOfferteVb.behandelaar) || i.ondertekenaar || '';
  const klantkenmerkVb = (laatsteOfferteVb && laatsteOfferteVb.uwKenmerk) || '';
  const gekoppeldeFacturenVb = state.facturen.filter(f=>f.projectId===p.id);
  const voorschotFactuurVb = gekoppeldeFacturenVb.find(f=>f.type==='voorschot');
  const eindFactuurVb = gekoppeldeFacturenVb.find(f=>f.type==='eind') || gekoppeldeFacturenVb.find(f=>f.type==='standaard');

  const voorbladAoa = [
    [i.bedrijfsnaam || '', '', '', '', '', p.id],
    [],
    ['klant', k? k.naam : ''],
    ['', k? (k.adres||'') : ''],
    ['', k? `${k.postcode||''} ${k.plaats||''}`.trim() : ''],
    [],
    ['contact', k? (k.contactpersoon||'') : ''],
    ['klantnummer', k? k.id : ''],
    ['klantkenmerk', klantkenmerkVb],
    ['werknemer', behandelaarVb],
    ['omschrijving', p.omschrijving || ''],
    [],
    ['', '', '', '', 'behandeld door', behandelaarVb],
    [fmtDate(p.startdatum), 'aanvraag'],
    ['', 'offreren', '', '', '', laatsteOfferteVb? laatsteOfferteVb.id : ''],
    ['', 'opvolgen'],
    ['', 'bevestigen'],
    [],
    ['', 'voorbereiden'],
    ['', 'materiaal bestellen'],
    ['', 'materiaal ontvangen'],
    ['', 'montage'],
    ['', 'nacalculeren'],
    ['', 'voorschotfactuur', '', 'nr:', voorschotFactuurVb? voorschotFactuurVb.id : '', 'betaald:', voorschotFactuurVb && voorschotFactuurVb.status==='Betaald' ? 'ja':''],
    ['', 'eindfactuur', '', 'nr:', eindFactuurVb? eindFactuurVb.id : '', 'betaald:', eindFactuurVb && eindFactuurVb.status==='Betaald' ? 'ja':''],
    [],
    ['', 'resultaat', '', '', '', '', '', p.id],
    [],
    [i.bedrijfsnaam || ''],
    [`${i.adres||''}  ${i.postcode||''} ${i.plaats||''}`.trim()],
  ];
  const voorbladWs = XLSX.utils.aoa_to_sheet(voorbladAoa);
  voorbladWs['!cols'] = [{wch:10},{wch:22},{wch:8},{wch:8},{wch:14},{wch:16},{wch:10}];
  voorbladWs['!pageSetup'] = { paperSize:9, orientation:'portrait', fitToWidth:1, fitToHeight:1, scale:100 };
  voorbladWs['!margins'] = { left:0.5, right:0.5, top:0.6, bottom:0.6, header:0.3, footer:0.3 };
  voorbladWs['!fitToPage'] = true;
  ['A1','F1','H27','A29'].forEach(cellRef=>{
    if(voorbladWs[cellRef]) voorbladWs[cellRef].s = { font:{ bold:true, sz: cellRef==='F1'||cellRef==='H27'? 20 : 12 } };
  });
  XLSX.utils.book_append_sheet(wb, voorbladWs, 'Voorblad');

  // Kengetallen-blad
  const keAoa = [
    ['Kengetallen', '', ''],
    ['Deze getallen kan je aanpassen', '', ''],
    [],
    ['uren tarief', '', i.uurtarief],
    ['materiaalmarge (factor)', '', +(1+i.materiaalmarge/100).toFixed(4)],
    ['btw (factor)', '', +(1+i.btw/100).toFixed(4)],
    ['kantoorkosten (fractie)', '', +(i.kantoorkosten/100).toFixed(4)],
  ];
  const keWs = XLSX.utils.aoa_to_sheet(keAoa);
  keWs['!cols'] = [{wch:26},{wch:4},{wch:12}];
  XLSX.utils.book_append_sheet(wb, keWs, 'Kengetallen');
  const KE_UURTARIEF = 'Kengetallen!$C$4';
  const KE_MARGE = 'Kengetallen!$C$5';
  const KE_BTW = 'Kengetallen!$C$6';
  const KE_KANTOOR = 'Kengetallen!$C$7';

  const gebruikteNamen = new Set(['Voorblad','Kengetallen','Totaaloverzicht']);
  const onderdeelInfo = [];


  p.begroting.onderdelen.forEach(o=>{
    const naam = sheetNaam(o.naam, gebruikteNamen);
    const aoa = [
      [o.naam],
      [`Klant: ${k? k.naam : ''}`, '', `Werknummer: ${p.id}`],
      o.afmetingen ? [`Afmetingen: ${o.afmetingen}`] : [],
      [],
      ['Materiaal'],
      ['Aantal','Omschrijving','Prijs','Materiaal inkoop','Materiaal verkoop'],
    ];
    const matStartRow = aoa.length + 1;
    o.materiaalregels.forEach(r=>{ aoa.push([r.aantal||0, r.omschrijving||'', r.prijs||0, 0, 0]); });
    const matEndRow = matStartRow + o.materiaalregels.length - 1;
    const matSubRow = matEndRow + 1;
    aoa.push(['Sub totaal materiaal','','','','']);
    aoa.push([]);
    const urenHeaderRow = aoa.length + 1;
    aoa.push(['Uren']);
    aoa.push(['Omschrijving','Uren voorbereiding','Uren montage','Uren totaal','Totaal euro']);
    const urenStartRow = aoa.length + 1;
    o.urenregels.forEach(r=>{ aoa.push([r.omschrijving||'', r.urenVoorbereiding||0, r.urenMontage||0, 0, 0]); });
    const urenEndRow = urenStartRow + o.urenregels.length - 1;
    const urenSubRow = urenEndRow + 1;
    aoa.push(['Sub totaal uren','','','','']);
    aoa.push([]);
    const kantoorRow = aoa.length + 1;
    aoa.push(['Kantoorkosten','','','','']);
    const exclRow = aoa.length + 1;
    aoa.push(['Aanneemsom exclusief btw','','','','']);
    const inclRow = aoa.length + 1;
    aoa.push(['Aanneemsom inclusief btw','','','','']);

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:26},{wch:22},{wch:11},{wch:13},{wch:14}];

    for(let r=matStartRow; r<=matEndRow; r++){
      ws[`D${r}`] = {t:'n', f:`A${r}*C${r}`};
      ws[`E${r}`] = {t:'n', f:`D${r}*${KE_MARGE}`};
    }
    if(o.materiaalregels.length){
      ws[`D${matSubRow}`] = {t:'n', f:`SUM(D${matStartRow}:D${matEndRow})`};
      ws[`E${matSubRow}`] = {t:'n', f:`SUM(E${matStartRow}:E${matEndRow})`};
    } else { ws[`D${matSubRow}`] = {t:'n', v:0}; ws[`E${matSubRow}`] = {t:'n', v:0}; }

    for(let r=urenStartRow; r<=urenEndRow; r++){
      ws[`D${r}`] = {t:'n', f:`B${r}+C${r}`};
      ws[`E${r}`] = {t:'n', f:`D${r}*${KE_UURTARIEF}`};
    }
    if(o.urenregels.length){
      ws[`D${urenSubRow}`] = {t:'n', f:`SUM(D${urenStartRow}:D${urenEndRow})`};
      ws[`E${urenSubRow}`] = {t:'n', f:`SUM(E${urenStartRow}:E${urenEndRow})`};
    } else { ws[`D${urenSubRow}`] = {t:'n', v:0}; ws[`E${urenSubRow}`] = {t:'n', v:0}; }

    ws[`E${kantoorRow}`] = {t:'n', f:`(E${matSubRow}+E${urenSubRow})*${KE_KANTOOR}`};
    ws[`E${exclRow}`] = {t:'n', f:`E${matSubRow}+E${urenSubRow}+E${kantoorRow}`};
    ws[`E${inclRow}`] = {t:'n', f:`E${exclRow}*${KE_BTW}`};

    ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:inclRow-1, c:4}});
    XLSX.utils.book_append_sheet(wb, ws, naam);
    onderdeelInfo.push({naam, sheetNaam:naam, exclRow, inclRow, exclCol:'E', inclCol:'E'});
  });

  // Totaaloverzicht-blad
  const totAoa = [
    ['Totaaloverzicht', '', ''],
    [`Klant: ${k? `${k.naam} (${k.id})` : ''}`],
    [`Werknummer: ${p.id}  -  ${p.omschrijving||''}`],
    [],
    ['Onderdeel', 'Aanneemsom excl. btw', 'Aanneemsom incl. btw'],
  ];
  onderdeelInfo.forEach(o=> totAoa.push([o.naam, 0, 0]));
  const totRow = totAoa.length + 1;
  totAoa.push(['Totaal', 0, 0]);
  const totWs = XLSX.utils.aoa_to_sheet(totAoa);
  totWs['!cols'] = [{wch:26},{wch:20},{wch:20}];
  onderdeelInfo.forEach((o, idx)=>{
    const row = 6 + idx;
    totWs[`B${row}`] = {t:'n', f:`'${o.sheetNaam}'!${o.exclCol}${o.exclRow}`};
    totWs[`C${row}`] = {t:'n', f:`'${o.sheetNaam}'!${o.inclCol}${o.inclRow}`};
  });
  if(onderdeelInfo.length){
    const firstRow = 6, lastRow = 5 + onderdeelInfo.length;
    totWs[`B${totRow}`] = {t:'n', f:`SUM(B${firstRow}:B${lastRow})`};
    totWs[`C${totRow}`] = {t:'n', f:`SUM(C${firstRow}:C${lastRow})`};
  }
  totWs['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:totRow, c:2}});
  const sheets = wb.SheetNames.slice().filter(n=>n!=='Voorblad');
  XLSX.utils.book_append_sheet(wb, totWs, 'Totaaloverzicht');
  wb.SheetNames = ['Voorblad', 'Totaaloverzicht', ...sheets];

  const arrayBuffer = XLSX.write(wb, {type:'array', bookType:'xlsx', cellStyles:true});
  const blob = new Blob([arrayBuffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const inMapOpgeslagen = await bewaarBestand(`Begroting_${p.id}.xlsx`, blob, p, 'los');
  showToast(inMapOpgeslagen ? 'Opgeslagen in map (Excel)' : 'Excel-bestand gedownload');
}

function wPara({text='', bold=false, size=22, align='left', after=120}={}){
  const rPr = '<w:rPr>' + (bold?'<w:b/>':'') + `<w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/></w:rPr>`;
  const pPr = `<w:pPr><w:spacing w:after="${after}"/>` + (align!=='left'?`<w:jc w:val="${align}"/>`:'') + '</w:pPr>';
  return `<w:p>${pPr}<w:r>${rPr}<w:t xml:space="preserve">${esc(text)}</w:t></w:r></w:p>`;
}
function wCell(text, {bold=false, width=2000, align='left', size=20}={}){
  return `<w:tc><w:tcPr><w:tcW w:w="${width}" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>${wPara({text, bold, size, align, after:0})}</w:tc>`;
}
function wRow(cells){ return `<w:tr>${cells.join('')}</w:tr>`; }
function wTable(header, rows, widths, aligns){
  const borders = `<w:tblBorders>
    <w:top w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
    <w:left w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
    <w:bottom w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
    <w:right w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
    <w:insideH w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
    <w:insideV w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
  </w:tblBorders>`;
  const grid = `<w:tblGrid>${widths.map(w=>`<w:gridCol w:w="${w}"/>`).join('')}</w:tblGrid>`;
  const hCells = header.map((t,idx)=> wCell(t, {bold:true, width:widths[idx], align:aligns[idx]}));
  const rowsXml = [wRow(hCells)].concat(rows.map(r=> wRow(r.map((t,idx)=> wCell(t, {width:widths[idx], align:aligns[idx]})))));
  return `<w:tbl><w:tblPr><w:tblW w:w="0" w:type="auto"/>${borders}</w:tblPr>${grid}${rowsXml.join('')}</w:tbl>`;
}
function wKenmerkenXml(pairs){

}

/* ===================== DOCUMENTENMAP (opslaan op de computer) ===================== */
function ondersteuntBestandsMap(){
  return typeof window.showDirectoryPicker === 'function';
}
function openHandleDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open('werkplaats-bestandshandles', 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function bewaarMapHandle(handle){
  const idb = await openHandleDB();
  return new Promise((resolve, reject)=>{
    const tx = idb.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'documentenmap');
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}
async function verwijderMapHandle(){
  const idb = await openHandleDB();
  return new Promise((resolve, reject)=>{
    const tx = idb.transaction('handles', 'readwrite');
    tx.objectStore('handles').delete('documentenmap');
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}
async function haalMapHandleOp(){
  try{
    const idb = await openHandleDB();
    return await new Promise((resolve, reject)=>{
      const tx = idb.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('documentenmap');
      req.onsuccess = ()=> resolve(req.result || null);
      req.onerror = ()=> reject(req.error);
    });
  }catch(e){ return null; }
}
async function haalGeldigeMapHandle(){
  if(!ondersteuntBestandsMap()) return null;
  const handle = await haalMapHandleOp();
  if(!handle) return null;
  try{
    let perm = await handle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted') perm = await handle.requestPermission({mode:'readwrite'});
    return perm === 'granted' ? handle : null;
  }catch(e){ return null; }
}
function saneerMapnaam(naam){
  return String(naam||'').replace(/[\\/:*?"<>|]/g,' ').trim().slice(0,60) || 'Project';
}
async function bepaalDoelMap(rootHandle, project, categorie){
  const klant = project ? klantById(project.klantId) : null;
  if(!klant){
    // Geen klant gekoppeld: terugvaloptie, gewoon een map per project in de hoofdmap
    const submapNaam = saneerMapnaam(`${project.id} - ${project.omschrijving||''}`);
    return await rootHandle.getDirectoryHandle(submapNaam, {create:true});
  }
  const typeMapNaam = klant.type === 'Particulier' ? 'Particulieren' : 'Bedrijven';
  const typeMap = await rootHandle.getDirectoryHandle(typeMapNaam, {create:true});
  const klantMapNaam = saneerMapnaam(`${klant.id} - ${klant.naam}`);
  const klantMap = await typeMap.getDirectoryHandle(klantMapNaam, {create:true});
  if(categorie === 'offerte') return await klantMap.getDirectoryHandle('Offertes', {create:true});
  if(categorie === 'factuur') return await klantMap.getDirectoryHandle('Facturen', {create:true});
  return klantMap; // categorie 'los': voorblad en begroting direct in de klantmap
}

async function bewaarBestand(bestandsnaam, blob, project, categorie='los'){
  const rootHandle = await haalGeldigeMapHandle();
  if(!rootHandle){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = bestandsnaam;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
    return false;
  }
  try{
    const doelMap = project ? await bepaalDoelMap(rootHandle, project, categorie) : rootHandle;
    const fileHandle = await doelMap.getFileHandle(bestandsnaam, {create:true});
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
    return true;
  }catch(e){
    showToast('Opslaan in map mislukt, bestand wordt gedownload: ' + e.message);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = bestandsnaam;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
    return false;
  }
}

async function genereerPdf(filename, blocks, {project=null, categorie='los'}={}){
  if(typeof window.jspdf === 'undefined'){ showToast('Pdf-bibliotheek kon niet laden, controleer je internetverbinding'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const marginLeft = 20, marginRight = 20, pageWidth = 210, pageHeight = 297, marginBottom = 20;
  const contentWidth = pageWidth - marginLeft - marginRight;
  let y = 18;

  const i = state.instellingen;
  if(i.logoBase64){
    try{
      const mime = i.logoMime || 'image/jpeg';
      const ext = mime.includes('png') ? 'PNG' : 'JPEG';
      const dataUrl = `data:${mime};base64,${i.logoBase64}`;
      const props = doc.getImageProperties(dataUrl);
      const imgWidthMm = 76;
      const imgHeightMm = imgWidthMm * (props.height/props.width);
      doc.addImage(dataUrl, ext, pageWidth - marginRight - imgWidthMm, 12, imgWidthMm, imgHeightMm);
      y = Math.max(y, 12 + imgHeightMm + 8);
    }catch(e){ /* logo overslaan bij fout, rest van het document gaat gewoon door */ }
  }

  function nieuwePaginaIndienNodig(extra){
    if(y + extra > pageHeight - marginBottom){ doc.addPage(); y = 18; }
  }

  blocks.forEach(b=>{
    if(b.t==='space'){ y += b.h; return; }
    const size = b.size || 10;
    const lineHeightMm = size * 0.42;
    doc.setFont('helvetica', b.bold ? 'bold' : 'normal');
    doc.setFontSize(size);
    if(b.t==='text'){
      const regels = doc.splitTextToSize(b.text||'', contentWidth);
      regels.forEach(regel=>{
        nieuwePaginaIndienNodig(lineHeightMm+2);
        const x = b.align==='center' ? pageWidth/2 : b.align==='right' ? pageWidth-marginRight : marginLeft;
        doc.text(regel, x, y, {align: b.align||'left'});
        y += lineHeightMm + 1.3;
      });
    } else if(b.t==='tabline'){
      nieuwePaginaIndienNodig(lineHeightMm+2);
      doc.text(String(b.left||''), marginLeft, y);
      doc.text(String(b.right||''), pageWidth-marginRight, y, {align:'right'});
      y += lineHeightMm + 1.6;
    } else if(b.t==='kenmerk'){
      nieuwePaginaIndienNodig(lineHeightMm+2);
      const labelKolomBreedte = b.labelKolomBreedte || 40;
      doc.text(String(b.label||''), marginLeft+labelKolomBreedte, y, {align:'right'});
      doc.text(':', marginLeft+labelKolomBreedte+1.5, y);
      doc.text(String(b.value||''), marginLeft+labelKolomBreedte+5, y);
      y += lineHeightMm + 1.3;
    }
  });

  const blob = doc.output('blob');
  const inMapOpgeslagen = await bewaarBestand(filename, blob, project, categorie);
  showToast(inMapOpgeslagen ? `Ook als pdf opgeslagen (${filename})` : 'Ook als pdf gedownload');
}

async function genereerDocx(filename, bodyXml, {logoExt=null, logoBase64=null, project=null, categorie='los'}={}){
  if(typeof JSZip === 'undefined'){ showToast('Word-bibliotheek kon niet laden, controleer je internetverbinding'); return; }
  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>
${bodyXml}
<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1417" w:right="1417" w:bottom="1417" w:left="1417" w:header="708" w:footer="708" w:gutter="0"/></w:sectPr>
</w:body>
</w:document>`;
  const zip = new JSZip();
  zip.file('[Content_Types].xml', docxContentTypesXml(logoExt));
  zip.file('_rels/.rels', DOCX_RELS_ROOT);
  zip.file('word/document.xml', documentXml);
  if(logoExt && logoBase64){
    zip.file('word/_rels/document.xml.rels', docxRelsDocXml(logoExt));
    zip.file(`word/media/logo.${logoExt}`, logoBase64, {base64:true});
  }
  const blob = await zip.generateAsync({type:'blob'});
  const inMapOpgeslagen = await bewaarBestand(filename, blob, project, categorie);
  showToast(inMapOpgeslagen ? `Opgeslagen in map (${filename})` : 'Word-bestand gedownload');
}

function klantAanhefXml(k){

  if(k) xml += wPara({text:`${k.postcode||''} ${k.plaats||''}`.trim(), size:22, after:280});

        <div class="field"><label>Prijs (inkoop)</label><input type="number" step="0.01" name="prijs" required value="${m.prijs}"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="modal-cancel">Annuleren</button>
        <button type="submit" class="btn btn-primary">${materiaal ? 'Opslaan' : 'Materiaal toevoegen'}</button>
      </div>
    </form>
  `;
}

function openMateriaalModal(materiaalId){
  const materiaal = materiaalId ? state.materialen.find(m=>m.id===materiaalId) : null;
  openModal(materiaalForm(materiaal));
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('materiaal-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { naam: fd.get('naam').trim(), eenheid: fd.get('eenheid').trim(), prijs: parseFloat(fd.get('prijs'))||0 };
    try{
      if(materiaal){
        await db.collection('materialen').doc(materiaal.id).update(data);
      } else {
        await db.collection('materialen').add(data);
      }
      closeModal();
      showToast(materiaal ? 'Materiaal bijgewerkt' : 'Materiaal toegevoegd');
    }catch(err){ showToast('Opslaan mislukt: ' + err.message); }
  });
}

async function verwijderMateriaal(id){
  if(!confirm('Dit materiaal uit de lijst verwijderen?')) return;
  try{ await db.collection('materialen').doc(id).delete(); showToast('Materiaal verwijderd'); }
  catch(err){ showToast('Verwijderen mislukt: ' + err.message); }
}

function materialenDatalistXml(){
  return `<datalist id="materialen-datalist">${state.materialen.map(m=>`<option value="${esc(m.naam)}" data-prijs="${m.prijs}"></option>`).join('')}</datalist>`;
}

/* ===================== UREN (overzicht) ===================== */
const GEEN_PROJECT_ID = 'V0000';
let urenWerknemerFilter = '';
let urenAlleenAfwezigheid = false;

function viewUren(){
  const werknemers = [...state.werknemers].sort((a,b)=>(a.naam||'').localeCompare(b.naam||''));
  let lijst = [...state.urenregistraties].sort((a,b)=> (b.datum||'').localeCompare(a.datum||'') || (b.startTijd||'').localeCompare(a.startTijd||''));
  if(urenWerknemerFilter) lijst = lijst.filter(u=>u.werknemerId===urenWerknemerFilter);
  if(urenAlleenAfwezigheid) lijst = lijst.filter(u=>u.projectId===GEEN_PROJECT_ID);

  const totaalUren = som(lijst.map(u=>u.uren));
  const afwezigUren = som(state.urenregistraties.filter(u=> (!urenWerknemerFilter || u.werknemerId===urenWerknemerFilter) && u.projectId===GEEN_PROJECT_ID).map(u=>u.uren));

  return `
    <h1 class="page-title">Uren</h1>
    <p class="page-sub">Alle geregistreerde uren van werknemers, inclusief verlof, ziekte en afspraken</p>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Totaal uren (huidige selectie)</div>
        <div class="value">${totaalUren.toFixed(2)} u</div>
      </div>
      <div class="stat-card">
        <div class="label">Waarvan verlof / ziekte / afspraak</div>
        <div class="value">${afwezigUren.toFixed(2)} u</div>
      </div>
    </div>

    <div class="toolbar">
      <select id="uren-werknemer-filter" class="btn btn-sm" style="border-radius:6px;">
        <option value="">Alle werknemers</option>
        ${werknemers.map(w=>`<option value="${w.uid}" ${w.uid===urenWerknemerFilter?'selected':''}>${esc(w.naam)}</option>`).join('')}
      </select>
      <label style="display:flex; align-items:center; gap:6px; font-size:13.5px; color:var(--text-muted);">
        <input type="checkbox" id="uren-afwezig-filter" ${urenAlleenAfwezigheid?'checked':''}>
        Alleen verlof/ziekte/afspraak
      </label>
    </div>

    <div class="panel">
      <table>
        <thead><tr><th>Datum</th><th>Werknemer</th><th>Project</th><th>Type</th><th>Tijd</th><th style="text-align:right;">Uren</th><th>Opmerking</th></tr></thead>
        <tbody>
          ${lijst.length ? lijst.map(u=>{
            const project = projectById(u.projectId);
            const isAfwezig = u.projectId === GEEN_PROJECT_ID;
            return `<tr>
              <td>${fmtDate(u.datum)}</td>
              <td>${esc(u.werknemerNaam||'-')}</td>
              <td>${isAfwezig ? `<span class="tag-nummer" style="background:var(--rust-bg); color:var(--rust);">${GEEN_PROJECT_ID}</span>` : (project? `<span class="tag-nummer">${project.id}</span> ${esc(project.omschrijving||'')}` : esc(u.projectId||'-'))}</td>
              <td>${esc(u.type||'-')}</td>
              <td>${esc(u.startTijd||'')}&ndash;${esc(u.eindTijd||'')}</td>
              <td style="text-align:right;">${u.uren} u</td>
              <td>${esc(u.opmerking||'')}</td>
            </tr>`;
          }).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="title">Nog geen uren geregistreerd</div>Zodra werknemers uren invoeren via de urenregistratie-app, verschijnen die hier.</div></td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

/* ===================== BTW (per kwartaal) ===================== */
function kwartaalVanDatum(datumStr){
  if(!datumStr) return null;
  const d = new Date(datumStr);
  if(isNaN(d)) return null;
  const jaar = d.getFullYear();
  const kwartaal = Math.floor(d.getMonth()/3) + 1;
  return {jaar, kwartaal, key:`${jaar}-Q${kwartaal}`};
}
function viewBtw(){
  const groepen = {};
  state.facturen.forEach(f=>{
    const kw = kwartaalVanDatum(f.datum);
    if(!kw) return;
    if(!groepen[kw.key]) groepen[kw.key] = {jaar:kw.jaar, kwartaal:kw.kwartaal, omzet:0, btw:0, totaal:0, aantal:0};
    const t = factuurTotalen(f);
    groepen[kw.key].omzet += t.subtotaal;
    groepen[kw.key].btw += t.btw;
    groepen[kw.key].totaal += t.totaal;
    groepen[kw.key].aantal += 1;
  });
  const lijst = Object.values(groepen).sort((a,b)=> b.jaar-a.jaar || b.kwartaal-a.kwartaal);
  const huidig = kwartaalVanDatum(todayISO());
  const huidigeGroep = huidig ? groepen[huidig.key] : null;

  return `
    <h1 class="page-title">Btw</h1>
    <p class="page-sub">Btw over verzonden facturen, per kwartaal — op basis van de factuurdatum (factuurstelsel). Let op: dit is exclusief eventuele aftrekbare btw over inkopen; controleer dit altijd met je boekhouder of de Belastingdienst.</p>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Huidig kwartaal (${huidig? 'Q'+huidig.kwartaal+' '+huidig.jaar : '-'})</div>
        <div class="value">${euro(huidigeGroep? huidigeGroep.btw : 0)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Omzet dit kwartaal (excl. btw)</div>
        <div class="value">${euro(huidigeGroep? huidigeGroep.omzet : 0)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Aantal facturen dit kwartaal</div>
        <div class="value">${huidigeGroep? huidigeGroep.aantal : 0}</div>
      </div>
    </div>

    <h2 style="font-family:var(--font-display); font-size:17px; font-weight:600; margin:26px 0 10px;">Per kwartaal</h2>
    <div class="panel">
      <table>
        <thead><tr><th>Kwartaal</th><th style="text-align:right;">Omzet excl. btw</th><th style="text-align:right;">Btw</th><th style="text-align:right;">Omzet incl. btw</th><th style="text-align:right;">Aantal facturen</th></tr></thead>
        <tbody>
          ${lijst.length ? lijst.map(g=>`
            <tr ${huidig && g.jaar===huidig.jaar && g.kwartaal===huidig.kwartaal ? 'style="font-weight:600;"' : ''}>
              <td>Q${g.kwartaal} ${g.jaar}${huidig && g.jaar===huidig.jaar && g.kwartaal===huidig.kwartaal ? ' (huidig)' : ''}</td>
              <td style="text-align:right;">${euro(g.omzet)}</td>
              <td style="text-align:right;">${euro(g.btw)}</td>
              <td style="text-align:right;">${euro(g.totaal)}</td>
              <td style="text-align:right;">${g.aantal}</td>
            </tr>
          `).join('') : `<tr><td colspan="5"><div class="empty-state"><div class="title">Nog geen facturen</div>Zodra je facturen aanmaakt, verschijnt hier het btw-overzicht per kwartaal.</div></td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

/* ===================== BACK-UP & HERSTEL ===================== */
function exporteerBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const datumStr = todayISO();
  a.href = url;
  a.download = `Backup_Werkplaats_Administratie_${datumStr}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 4000);
  state.instellingen.laatsteBackup = new Date().toISOString();
  saveState();
  showToast('Back-up gedownload');
}

async function herstelBackup(file){
  let data;
  try{
    const tekst = await leesBestandAlsTekst(file);
    data = JSON.parse(tekst);
  }catch(e){
    showToast('Dit bestand kon niet worden gelezen als back-up');
    return;
  }
  if(!data || typeof data !== 'object' || !Array.isArray(data.klanten)){
    showToast('Dit lijkt geen geldig back-upbestand van deze app te zijn');
    return;
  }
  if(!confirm('Weet je het zeker? Dit vervangt alle huidige gegevens door de gegevens uit het back-upbestand. Dit kan niet ongedaan gemaakt worden.')) return;
  const oudeKlanten = state.klanten.map(k=>k.id);
  const oudeProjecten = state.projecten.map(p=>p.id);
  const oudeOffertes = state.offertes.map(o=>o.id);
  const oudeFacturen = state.facturen.map(f=>f.id);
  state = data;
  normaliseerState();
  try{
    const verwijder = [];
    oudeKlanten.filter(id=> !state.klanten.some(k=>k.id===id)).forEach(id=> verwijder.push(db.collection('klanten').doc(id).delete()));
    oudeProjecten.filter(id=> !state.projecten.some(p=>p.id===id)).forEach(id=> verwijder.push(db.collection('projecten').doc(id).delete()));
    oudeOffertes.filter(id=> !state.offertes.some(o=>o.id===id)).forEach(id=> verwijder.push(db.collection('offertes').doc(id).delete()));
    oudeFacturen.filter(id=> !state.facturen.some(f=>f.id===id)).forEach(id=> verwijder.push(db.collection('facturen').doc(id).delete()));
    await Promise.all(verwijder);
    await saveState();
  }catch(e){ showToast('Herstellen deels mislukt: '+e.message); }
  showToast('Back-up hersteld');
  stelFaviconIn();
  navigate('dashboard', {});
}

function toonVergrendelknopIndienNodig(){
  const nav = document.getElementById('nav-vergrendel');
  if(!nav) return;
  nav.style.display = state.instellingen.pincodeHash ? 'flex' : 'none';
}

function toonVergrendelScherm(){
  document.getElementById('app').style.visibility = 'hidden';
  let overlay = document.getElementById('lock-screen');
  if(overlay) overlay.remove();
  overlay = document.createElement('div');
  overlay.id = 'lock-screen';
  overlay.innerHTML = `
    <div class="lock-box">
      <div class="lock-icon">🔒</div>
      <h2>Vergrendeld</h2>
      <form id="lock-form">
        <input type="password" inputmode="numeric" id="lock-pincode" placeholder="Pincode" autofocus>
        <div class="lock-error" id="lock-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Ontgrendelen</button>
      </form>
    </div>
  `;
  document.body.appendChild(overlay);
  const form = document.getElementById('lock-form');
  const input = document.getElementById('lock-pincode');
  input.focus();
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const hash = await hashTekst(input.value);
    if(hash === state.instellingen.pincodeHash){
      overlay.remove();
      document.getElementById('app').style.visibility = 'visible';
      navigate('dashboard', {});
    } else {
      document.getElementById('lock-error').textContent = 'Onjuiste pincode, probeer opnieuw';
      input.value = '';
      input.focus();
    }
  });
}

/* ===================== LOGIN (Firebase Authentication) ===================== */
function werknemerEmail(naam){
  const slug = naam.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'.').replace(/^\.+|\.+$/g,'');
  return `${slug}@${WERKNEMER_EMAIL_DOMEIN}`;
}

function verwijderLoginScherm(){
  const el = document.getElementById('login-screen');
  if(el) el.remove();
  document.getElementById('app').style.visibility = 'visible';
}

function toonLoginScherm(fout){
  document.getElementById('app').style.visibility = 'hidden';
  const bestaand = document.getElementById('login-screen');
  if(bestaand) bestaand.remove();
  const overlay = document.createElement('div');
  overlay.id = 'login-screen';
  overlay.innerHTML = `
    <div class="lock-box" style="max-width:380px;">
      <div class="lock-icon">🪵</div>
      <h2>Werkplaats Administratie</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="E-mailadres" style="letter-spacing:normal; text-align:left; font-size:15px;" autocomplete="username">
        <input type="password" id="login-wachtwoord" placeholder="Wachtwoord" style="letter-spacing:normal; text-align:left; font-size:15px;" autocomplete="current-password">
        <div class="lock-error" id="login-error">${fout? esc(fout): ''}</div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Inloggen</button>
      </form>
      <p style="margin:16px 0 0; font-size:12.5px;"><a href="#" id="toon-registreren" style="color:var(--copper-dark);">Eerste keer? Beheerdersaccount aanmaken</a></p>
      <form id="registreren-form" style="display:none; margin-top:12px; text-align:left; border-top:1px solid var(--border); padding-top:14px;">
        <div class="field"><label>Je naam</label><input type="text" id="reg-naam" required></div>
        <div class="field"><label>E-mailadres</label><input type="email" id="reg-email" required autocomplete="username"></div>
        <div class="field"><label>Wachtwoord (min. 6 tekens)</label><input type="password" id="reg-wachtwoord" required minlength="6" autocomplete="new-password"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Beheerdersaccount aanmaken</button>
      </form>
    </div>
  `;
  document.body.appendChild(overlay);

  document.getElementById('toon-registreren').addEventListener('click', (e)=>{
    e.preventDefault();
    document.getElementById('registreren-form').style.display = 'block';
  });

  document.getElementById('login-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const wachtwoord = document.getElementById('login-wachtwoord').value;
    try{
      await auth.signInWithEmailAndPassword(email, wachtwoord);
    }catch(err){
      document.getElementById('login-error').textContent = 'Inloggen mislukt: controleer e-mailadres en wachtwoord';
    }
  });

  document.getElementById('registreren-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const naam = document.getElementById('reg-naam').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const wachtwoord = document.getElementById('reg-wachtwoord').value;
    try{
      const cred = await auth.createUserWithEmailAndPassword(email, wachtwoord);
      await db.collection('werknemers').doc(cred.user.uid).set({naam, email, rol:'admin', actief:true});
    }catch(err){
      document.getElementById('login-error').textContent = 'Aanmaken mislukt: ' + err.message;
    }
  });
}

function toonGeenToegangScherm(){
  document.getElementById('app').style.visibility = 'hidden';
  const bestaand = document.getElementById('login-screen');
  if(bestaand) bestaand.remove();
  const overlay = document.createElement('div');
  overlay.id = 'login-screen';
  overlay.innerHTML = `
    <div class="lock-box">
      <div class="lock-icon">⛔</div>
      <h2>Geen toegang</h2>
      <p class="info-line">Dit account heeft geen toegang tot het beheerprogramma. Werknemers gebruiken de aparte urenregistratie-app.</p>
      <button class="btn" id="btn-uitloggen-geen-toegang" style="width:100%; margin-top:10px;">Uitloggen</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn-uitloggen-geen-toegang').addEventListener('click', ()=> auth.signOut());
}

/* ===================== INIT ===================== */
function stelFaviconIn(){
  try{
    const mime = state.instellingen.logoMime || 'image/jpeg';
    const base64 = state.instellingen.logoBase64;
    if(!base64) return;
    let link = document.querySelector('link[rel="icon"]');
    if(!link){ link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = `data:${mime};base64,${base64}`;
    let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
    if(!appleLink){ appleLink = document.createElement('link'); appleLink.rel = 'apple-touch-icon'; document.head.appendChild(appleLink); }
    appleLink.href = `data:${mime};base64,${base64}`;
  }catch(e){ /* favicon is decoratief, geen probleem als dit faalt */ }
}

let appGestart = false;
document.getElementById('nav-vergrendel').addEventListener('click', ()=> toonVergrendelScherm());

auth.onAuthStateChanged(async (user)=>{
  if(!user){
    appGestart = false;
    onSnapshotUnsubs.forEach(u=>u()); onSnapshotUnsubs = [];
    toonLoginScherm();
    return;
  }
  let werknemerDoc;
  try{
    werknemerDoc = await db.collection('werknemers').doc(user.uid).get();
  }catch(e){
    toonLoginScherm('Kon accountgegevens niet ophalen: ' + e.message);
    return;
  }
  if(!werknemerDoc.exists || werknemerDoc.data().rol !== 'admin'){
    toonGeenToegangScherm();
    return;
  }
  huidigeGebruiker = {uid:user.uid, naam:werknemerDoc.data().naam || user.email, rol:'admin'};
  verwijderLoginScherm();
  if(!appGestart){
    appGestart = true;
    await loadState();
    stelFaviconIn();
    if(state.instellingen.pincodeHash){
      toonVergrendelScherm();
    } else {
      navigate('dashboard', {});
    }
    toonVergrendelknopIndienNodig();
  }
});
</script>
